services:
  caddy:
    image: caddy:2.10
    container_name: kts-blackbirdzzzz-art-caddy
    depends_on:
      - web
      - api
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  cloudflared:
    profiles:
      - public-edge
    image: cloudflare/cloudflared:2026.3.0
    container_name: kts-blackbirdzzzz-art-cloudflared
    depends_on:
      - caddy
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN is required for public-edge}
    restart: unless-stopped

  web:
    build:
      context: ../ai-architect-web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-/}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://kts.blackbirdzzzz.art}
    container_name: kts-blackbirdzzzz-art-web-prod
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-/}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://kts.blackbirdzzzz.art}
    depends_on:
      - api

  api:
    build:
      context: ../ai-architect-api
    container_name: kts-blackbirdzzzz-art-api-prod
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      APP_NAME: KTC KTS API
      APP_ENV: production
      APP_PORT: 8000
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-https://kts.blackbirdzzzz.art,http://localhost}
      DATABASE_URL: postgresql+psycopg://dev:devpass@postgres:5432/ai_architect
      REDIS_URL: redis://redis:6379/0
      GPU_SERVICE_URL: ${GPU_SERVICE_URL:-http://gpu:8001}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://kts.blackbirdzzzz.art}
      JWT_SECRET: ${JWT_SECRET:-production-local-secret}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      OPENAI_COMPAT_MODEL: ${OPENAI_COMPAT_MODEL:-gpt-5.4}
      LLM_REQUEST_TIMEOUT_SECONDS: ${LLM_REQUEST_TIMEOUT_SECONDS:-15}
    depends_on:
      - postgres
      - redis
      - gpu
    volumes:
      - api_storage_prod:/app/storage

  gpu:
    build:
      context: ../ai-architect-gpu
    container_name: kts-blackbirdzzzz-art-gpu-prod
    environment:
      APP_NAME: KTC KTS GPU
      APP_ENV: production
      APP_PORT: 8001

  worker:
    build:
      context: ../ai-architect-api
    container_name: kts-blackbirdzzzz-art-worker-prod
    command: celery -A app.tasks.worker.celery_app worker --loglevel=info
    environment:
      APP_NAME: KTC KTS API Worker
      APP_ENV: production
      APP_PORT: 8000
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-https://kts.blackbirdzzzz.art,http://localhost}
      DATABASE_URL: postgresql+psycopg://dev:devpass@postgres:5432/ai_architect
      REDIS_URL: redis://redis:6379/0
      GPU_SERVICE_URL: ${GPU_SERVICE_URL:-http://gpu:8001}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://kts.blackbirdzzzz.art}
      JWT_SECRET: ${JWT_SECRET:-production-local-secret}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      OPENAI_COMPAT_MODEL: ${OPENAI_COMPAT_MODEL:-gpt-5.4}
      LLM_REQUEST_TIMEOUT_SECONDS: ${LLM_REQUEST_TIMEOUT_SECONDS:-15}
    depends_on:
      - postgres
      - redis
      - api
    volumes:
      - api_storage_prod:/app/storage

  postgres:
    image: postgres:16-alpine
    container_name: kts-blackbirdzzzz-art-postgres-prod
    environment:
      POSTGRES_DB: ai_architect
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kts-blackbirdzzzz-art-redis-prod

volumes:
  pgdata_prod:
  api_storage_prod:
  caddy_data:
  caddy_config:
